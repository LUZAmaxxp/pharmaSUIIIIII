services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: pharmacy_db
    ports:
      - "3307:3307"
    volumes:
      - pharmacy_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  pharmacy_db_data:
